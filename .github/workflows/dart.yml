name: Dart CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'
      - name: Install dependencies
        run: dart pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze project source
        run: dart analyze --fatal-infos

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk: ['stable', 'beta']
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}
      - name: Install dependencies
        run: dart pub get
      - name: Run tests
        run: |
          chmod +x tool/test.sh
          ./tool/test.sh

  test-env-vars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'
      - name: Install dependencies
        run: dart pub get
      - name: Run environment variables test
        run: |
          chmod +x tool/test_all_env_vars.sh
          ./tool/test_all_env_vars.sh

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'
      - uses: browser-actions/setup-chrome@v1
      - name: Install dependencies
        run: dart pub get
      - name: Run web tests in Chrome
        run: |
          chmod +x tool/web_tests.sh
          ./tool/web_tests.sh

  pana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'
      - name: Install dependencies
        run: dart pub get
      - name: Install pana
        run: dart pub global activate pana
      - name: Run pana
        run: dart pub global run pana --no-warning --source path .

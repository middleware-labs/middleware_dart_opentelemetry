# This file configures the static analysis results for your project (errors,
# warnings, and lints).
#
# Aligned with the dartastic_opentelemetry_api package, which uses the
# Dart/Flutter team lints maintained at:
# https://github.com/dart-lang/ecosystem/tree/main/pkgs/dart_flutter_team_lints

include: package:dart_flutter_team_lints/analysis_options.yaml

analyzer:
  exclude:
    - lib/proto/**
  errors:
    lines_longer_than_80_chars: ignore
    comment_references: ignore
    constant_identifier_names: ignore

linter:
  rules:
    - unnecessary_ignore
